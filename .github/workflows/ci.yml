name: LimpiaTuCiudad CI Pipeline

# 1. ¿Cuándo se ejecuta esto?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TRABAJO 1: Validar el Frontend
  validar-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Compilar React/Vite
      run: npm run build

  # TRABAJO 2: Validar el Backend
  validar-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-backend

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: ./go-backend/go.sum

    - name: Descargar dependencias
      run: go mod download

    - name: Verificar compilación del backend
      run: go build ./...

    - name: Iniciar backend y verificar health
      run: |
        go run cmd/api/main.go &
        sleep 5
        curl -f http://localhost:3000/health || exit 1