name: LimpiaTuCiudad CI Pipeline

# 1. ¿Cuándo se ejecuta esto?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # TRABAJO 1: Validar el Frontend
  validar-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Compilar React/Vite
      run: npm run build

  # TRABAJO 2: Validar el Backend
  validar-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json

    - name: Instalar dependencias
      run: npm ci

    - name: Verificar sintaxis del backend
      run: node --check src/index.js

    - name: Iniciar backend y verificar health
      run: |
        npm start &
        sleep 3
        curl -f http://localhost:3000/health || exit 1