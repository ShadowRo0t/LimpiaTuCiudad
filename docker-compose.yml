services:
  # ==========================================
  # Database - MongoDB
  # ==========================================
  database:
    image: mongo:6.0
    container_name: limpiatu-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # ==========================================
  # Backend - API Go
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limpiatu-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ENV=production
      - HTTP_ADDR=:3000
      - MONGO_URI=mongodb://database:27017
      - MONGO_DB=limpiatuciudad
      # - JWT_SECRET=
    depends_on:
      - database
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Frontend - React + Vite (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: limpiatu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
