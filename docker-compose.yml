services:
  # ==========================================
  # Backend - API Node.js
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limpiatu-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ENV=production
      - HTTP_ADDR=:3000
      # - MONGO_URI=mongodb://...
      # - JWT_SECRET=
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Frontend - React + Vite (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: limpiatu-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
